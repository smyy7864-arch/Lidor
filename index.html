<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dispatch System V12 - Ultimate Security</title>
  
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

  <style>
    * { box-sizing: border-box; cursor: crosshair; }
    body { font-family: 'Courier New', monospace; background: #000; color: #0f0; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; }

    .box { 
      padding: 30px; width: 90%; max-width: 400px; background: rgba(0, 0, 0, 0.9); 
      border: 2px solid #0f0; border-radius: 15px; box-shadow: 0 0 30px #0f0; position: relative; z-index: 10;
      backdrop-filter: blur(5px);
    }
    .bomb { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; filter: drop-shadow(0 0 5px red); }
    h2 { text-shadow: 0 0 10px #0f0; letter-spacing: 2px; }
    input { 
      width: 100%; margin: 12px 0; padding: 15px; border-radius: 8px; border: 1px solid #0f0; 
      background: #050505; color: #0f0; text-align: center; outline: none; font-size: 16px;
      box-shadow: inset 0 0 5px #0f0;
    }
    button { 
      padding: 15px; background: #0f0; color: #000; border: none; border-radius: 8px; 
      cursor: pointer; font-weight: bold; width: 100%; font-size: 18px; transition: 0.3s;
      text-transform: uppercase;
    }
    button:hover { background: #fff; box-shadow: 0 0 20px #fff; }
    .credit { font-size: 13px; color: #0f0; margin-top: 20px; font-weight: bold; text-shadow: 0 0 5px #000; }
    
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.98); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
    .modal-content { background: #000; border: 2px solid #0f0; padding: 25px; border-radius: 15px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 0 50px red; }
    .admin-section { background: #0a0a0a; border: 1px solid #333; margin: 10px 0; padding: 15px; border-radius: 10px; text-align: right; }
    .list-box { background: #000; border: 1px solid #222; padding: 8px; margin-top: 10px; font-size: 13px; max-height: 100px; overflow-y: auto; color: #f00; }
    .status { margin-top: 15px; font-weight: bold; font-size: 14px; color: #0f0; text-transform: uppercase; }
    .hidden { display: none; }
  </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="box">
  <div class="bomb" onclick="openAdminAuth()">💣</div>
  
  <div id="auth-section">
    <h2 id="glitch">SYSTEM LOCKED</h2>
    <input type="password" id="code" placeholder="ENTER ACCESS KEY">
    <button onclick="checkCode()">Decrypt</button>
    <div class="credit">By Nehoray yosef and Lidor belazada</div>
  </div>

  <div id="system" class="hidden">
    <h2>⚡ DISPATCH HUB</h2>
    <input type="text" id="phone" placeholder="TARGET NUMBER">
    <input type="number" id="duration" placeholder="STRIKE TIME (S)">
    <button id="exec-btn" onclick="startDispatch()">INJECT STRIKE 🚀</button>
    <div class="status" id="status">Syncing with Mainframe...</div>
    <div class="credit">By Nehoray yosef and Lidor belazada</div>
  </div>
</div>

<div id="admin-panel-modal" class="modal">
  <div class="modal-content">
    <h2 style="color: #f00; text-shadow: 0 0 10px red;">CORE ACCESS</h2>
    <div class="admin-section">
      <strong>🚫 BAN PHONE</strong>
      <input type="text" id="ban-num-input">
      <button onclick="addBlock('num')" style="padding:5px; background:red; color:white;">TERMINATE</button>
      <div class="list-box" id="list-nums"></div>
    </div>
    <div class="admin-section">
      <strong>🌐 BAN IP</strong>
      <input type="text" id="ban-ip-input">
      <button onclick="addBlock('ip')" style="padding:5px; background:red; color:white;">BLOCK IP</button>
      <div class="list-box" id="list-ips"></div>
    </div>
    <div class="credit" style="margin-bottom:10px;">By Nehoray yosef and Lidor belazada</div>
    <button onclick="closeModal('admin-panel-modal')" style="background:#333; color:#fff;">EXIT CORE</button>
  </div>
</div>

<script>
// --- קונפיגורציה ---
const WEBHOOKS = [
    "https://discord.com/api/webhooks/1499107473347313846/VN0GUsgF-yvXR5KoUszjJuIZbBqqYFs6hIVhGe-ZF7ppMqGDLW4WY-zZbYPk23ls2nl4",
    "https://discord.com/api/webhooks/1499159110212517958/esl_8wZEQlMCut5pIzXLpInNUYG8SnfGG3MKqccXNjNufvEROL9vj92-GcrcOKe0h_yU"
];

const firebaseConfig = {
  apiKey: "AIzaSyCzwIMkDXThLhfBf2QcBqi...", 
  authDomain: "nlspamer.firebaseapp.com",
  databaseURL: "https://nlspamer-default-rtdb.firebaseio.com/",
  projectId: "nlspamer",
  storageBucket: "nlspamer.appspot.com",
  messagingSenderId: "533175547118",
  appId: "1:533175547118:web:3de5beda..."
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ACCESS_CODE = "שחיף";
const ADMIN_CODE = "Juli";
let userIP = "מתבצע זיהוי...";
let deviceDetails = navigator.userAgent;

// --- זיהוי מכשיר ---
function getDevice() {
    if (/Android/i.test(deviceDetails)) return "Android Device";
    if (/iPhone|iPad/i.test(deviceDetails)) return "iOS Device";
    if (/Windows/i.test(deviceDetails)) return "Windows PC";
    return "Unknown Device";
}

// --- שליחה לשני בוטים ---
async function sendToDiscord(action) {
    const payload = {
        content: `**🚨 התראת אבטחה V12 🚨**\n**פעולה:** ${action}\n**כתובת IP:** ${userIP}\n**סוג מכשיר:** ${getDevice()}\n**דפדפן:** ${navigator.userAgent}\n-----------------------------`
    };
    
    WEBHOOKS.forEach(url => {
        fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).catch(err => console.log("Webhook error"));
    });
}

// --- מטריקס ---
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const letters = "01010182736450101"; const fontSize = 16;
const columns = canvas.width / fontSize; const drops = Array(Math.floor(columns)).fill(1);
function drawMatrix() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#0f0"; ctx.font = fontSize + "px monospace";
    drops.forEach((y, i) => {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, y * fontSize);
        if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    });
}
setInterval(drawMatrix, 35);

// --- לוגיקה ---
fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => { 
    userIP = d.ip; 
    sendToDiscord("🌐 משתמש חדש נכנס לאתר");
});

function checkCode() {
    let input = document.getElementById("code").value;
    if (input === ACCESS_CODE) {
        document.getElementById("auth-section").classList.add("hidden");
        document.getElementById("system").classList.remove("hidden");
        sendToDiscord("🔑 כניסה מוצלחת למערכת");
    } else {
        sendToDiscord(`❌ ניסיון כניסה נכשל! קוד שהוקש: ${input}`);
        alert("ACCESS DENIED - LOG SENT TO CORE");
    }
}

function openAdminAuth() {
    let pass = prompt("ROOT PASSWORD REQUIRED:");
    if (pass === ADMIN_CODE) {
        document.getElementById('admin-panel-modal').style.display = 'flex';
        sendToDiscord("⚡ כניסה לממשק ניהול (ADMIN)");
    } else {
        sendToDiscord(`⚠️ ניסיון פריצה לאדמין! סיסמה שגויה: ${pass}`);
    }
}

function addBlock(type) {
    const val = document.getElementById(type === 'ip' ? 'ban-ip-input' : 'ban-num-input').value;
    if(!val) return;
    db.ref(`blocks/${type}s`).push(val);
    sendToDiscord(`🚫 חסימה בוצעה! ${type}: ${val}`);
}

function startDispatch() {
    const phone = document.getElementById("phone").value;
    sendToDiscord(`🔥 התקפת ספאם הופעלה על: ${phone}`);
    alert("STRIKE INJECTED");
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

db.ref('blocks').on('value', (snapshot) => {
    const data = snapshot.val() || { ips: {}, nums: {} };
    const ipList = document.getElementById('list-ips');
    const numList = document.getElementById('list-nums');
    ipList.innerHTML = ""; numList.innerHTML = "";
    for (let key in data.ips) ipList.innerHTML += `<div>${data.ips[key]}</div>`;
    for (let key in data.nums) numList.innerHTML += `<div>${data.nums[key]}</div>`;
});
</script>
</body>
</html>
